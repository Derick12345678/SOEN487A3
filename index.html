<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Management System</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f9;
      color: #333;
    }
    .container {
      max-width: 800px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    h1, h2 {
      text-align: center;
      color: #2c3e50;
    }
    .section {
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid #ddd;
    }
    .section:last-child {
      border-bottom: none;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 12px;
      text-align: center;
    }
    th {
      background-color: #3498db;
      color: white;
    }
    tr:nth-child(even) {
      background-color: #f2f2f2;
    }
    .form-group {
      margin-bottom: 15px;
      display: flex;
      flex-direction: column;
    }
    input {
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-top: 5px;
      max-width: 300px;
    }
    button {
      padding: 10px 15px;
      font-size: 16px;
      color: white;
      background-color: #2ecc71;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 10px;
      max-width: 150px;
    }
    button:hover {
      background-color: #27ae60;
    }
    .result {
      margin-top: 15px;
      padding: 15px;
      background-color: #e8f8f5;
      border-left: 5px solid #1abc9c;
      display: none;
    }
    .error {
      background-color: #fdedec;
      border-left: 5px solid #e74c3c;
      color: #c0392b;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Student Management System</h1>

    <div class="section">
      <h2>All Students</h2>
      <table id="studentsTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Credits</th>
          </tr>
        </thead>
        <tbody id="studentsBody">
        </tbody>
      </table>
    </div>

    <div class="section">
      <h2>Find Student by ID</h2>
      <div class="form-group">
        <label for="searchId">Student ID:</label>
        <input type="text" id="searchId" placeholder="Enter student ID (e.g., 1)">
      </div>
      <button onclick="getStudentById()">Get Student</button>
      <div id="searchResult" class="result">
      </div>
    </div>

    <div class="section">
      <h2>Add New Student</h2>
      <div class="form-group">
        <label for="addName">Name:</label>
        <input type="text" id="addName" placeholder="Enter student name">
      </div>
      <div class="form-group">
        <label for="addCredits">Credits:</label>
        <input type="number" id="addCredits" placeholder="Enter student credits">
      </div>
      <button onclick="addStudent()">Add Student</button>
      <div id="addResult" class="result">
      </div>
    </div>
  </div>

  <script>
    const GRAPHQL_ENDPOINT = 'http://localhost:4000/graphql';

    async function sendGraphQLRequest(query, variables = {}) {
      try {
        console.log('Sending GraphQL Request:', { query, variables });
        const response = await fetch(GRAPHQL_ENDPOINT, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ query, variables })
        });
        
        const result = await response.json();
        console.log('GraphQL Response:', result);
        return result;
      } catch (error) {
        console.error('Network or fetch error:', error);
        throw error;
      }
    }

    async function fetchStudents() {
      console.log('Fetching all students...');
      
      const query = `
        query {
          students {
            id
            name
            credits
          }
        }
      `;

      try {
        const { data, errors } = await sendGraphQLRequest(query);
        
        if (errors) {
          console.error('GraphQL validation/execution errors:', errors);
          return;
        }

        const studentsBody = document.getElementById('studentsBody');
        studentsBody.innerHTML = ''; 

        data.students.forEach(student => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${student.id}</td>
            <td>${student.name}</td>
            <td>${student.credits}</td>
          `;
          studentsBody.appendChild(row);
        });
        
      } catch (error) {
        console.error('Failed to fetch students:', error);
      }
    }

    async function getStudentById() {
      const searchId = document.getElementById('searchId').value.trim();
      const searchResult = document.getElementById('searchResult');
      
      if (!searchId) {
        alert('Please enter a valid Student ID');
        return;
      }

      console.log(`Fetching student with ID: ${searchId}`);
      
      const query = `
        query GetStudent($id: ID!) {
          student(id: $id) {
            id
            name
            credits
          }
        }
      `;
      const variables = { id: searchId };

      try {
        const { data, errors } = await sendGraphQLRequest(query, variables);
        
        searchResult.style.display = 'block';

        if (errors) {
          console.error('GraphQL validation/execution errors:', errors);
          searchResult.className = 'result error';
          searchResult.innerHTML = `<strong>Error:</strong> Failed to fetch student.`;
          return;
        }

        if (data.student) {
          searchResult.className = 'result';
          searchResult.innerHTML = `
            <strong>Student Found:</strong><br>
            Name: ${data.student.name} <br>
            Credits: ${data.student.credits}
          `;
        } else {
          searchResult.className = 'result error';
          searchResult.innerHTML = `<strong>Not Found:</strong> No student found with ID ${searchId}`;
        }
      } catch (error) {
        searchResult.style.display = 'block';
        searchResult.className = 'result error';
        searchResult.innerHTML = `<strong>Error:</strong> Something went wrong. Check console.`;
      }
    }

    async function addStudent() {
      const name = document.getElementById('addName').value.trim();
      const credits = parseInt(document.getElementById('addCredits').value, 10);
      const addResult = document.getElementById('addResult');

      if (!name || isNaN(credits)) {
        alert('Please provide a valid name and number of credits.');
        return;
      }

      console.log(`Adding new student: ${name} with ${credits} credits`);

      const mutation = `
        mutation AddStudent($name: String!, $credits: Int!) {
          addStudent(name: $name, credits: $credits) {
            id
            name
            credits
          }
        }
      `;
      const variables = { name, credits };

      try {
        const { data, errors } = await sendGraphQLRequest(mutation, variables);
        
        addResult.style.display = 'block';

        if (errors) {
          console.error('GraphQL validation/execution errors:', errors);
          addResult.className = 'result error';
          addResult.innerHTML = `<strong>Error:</strong> Failed to add student.`;
          return;
        }

        addResult.className = 'result';
        addResult.innerHTML = `
          <strong>Success!</strong> Added ${data.addStudent.name} (ID: ${data.addStudent.id}).
        `;

        document.getElementById('addName').value = '';
        document.getElementById('addCredits').value = '';

        fetchStudents();
        
      } catch (error) {
        addResult.style.display = 'block';
        addResult.className = 'result error';
        addResult.innerHTML = `<strong>Error:</strong> Something went wrong. Check console.`;
      }
    }

    window.onload = () => {
      fetchStudents();
    };
  </script>
</body>
</html>
